name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  test-linux:
    runs-on: depot-ubuntu-24.04-32
    env:
      PROPTEST_CASES: 0
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Run tests with coverage
        run: |
          rustup toolchain install nightly
          cargo +nightly llvm-cov --no-report nextest --workspace --features facet-json/ci
          cargo +nightly llvm-cov --no-report --doc --workspace
          mkdir -p coverage
          cargo +nightly llvm-cov report --doctests --lcov --output-path coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  miri:
    runs-on: depot-ubuntu-24.04-32
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri,rust-src,llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Run Miri
        run: just miri-json

  msrv:
    runs-on: depot-ubuntu-24.04-16
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Check MSRV
        run: just msrv

  docs:
    runs-on: depot-ubuntu-24.04-16
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: just docs

  readme:
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-reedme
        run: cargo +stable install cargo-reedme --version 0.6.1 --locked

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Check generated READMEs
        run: |
          rustup toolchain install nightly
          just reedme-check

  lockfile:
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Check lockfile
        run: just lockfile

  semver-checks:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: depot-ubuntu-24.04-16
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run cargo-semver-checks
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          manifest-path: Cargo.toml
          baseline-rev: origin/main
          exclude: facet-json-classics,facet-format-suite
          verbose: true

  test-macos:
    runs-on: depot-macos-15
    env:
      PROPTEST_CASES: 0
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run nextest tests
        run: cargo nextest run --workspace

  test-windows:
    runs-on: depot-windows-2025-32
    env:
      PROPTEST_CASES: 0
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run nextest tests
        run: cargo nextest run --workspace
